<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Dinovation Digital</title>
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #6C63FF, #00BFA6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.15);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    .login-logo {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #333;
    }

    .login-subtitle {
      text-align: center;
      font-size: 14px;
      color: #777;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 16px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #6C63FF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #574fd6;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error { background: #ffe5e5; color: #b00020; }
    .success { background: #e6fff5; color: #00796b; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #777;
    }

    .footer a {
      color: #6C63FF;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">🦕 Dinovation</div>
    <div class="login-subtitle">Connexion à votre espace</div>

    <div id="message" class="message"></div>

    <input type="email" id="email" placeholder="Votre email" />
    <input type="password" id="password" placeholder="Mot de passe" />

    <button onclick="login()">Se connecter</button>

    <div class="footer">
      Pas encore de compte ? <a href="contact.html">Contactez-nous</a><br><br>
      <a href="../index.html">← Retour</a>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = "https://qnygcapchhosngnfvpoc.supabase.co";
const SUPABASE_KEY = "sb_publishable_QonESzjYgZM5l8Fo8hpgUg_nYYpYrVv";

// Connexion utilisateur
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/utilisateurs?email=eq." + email + "&motdepasse=eq." + password,
    {
      headers: {
        "apikey": SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  if (data.length === 0) {
    showMessage("error", "❌ Email ou mot de passe incorrect");
    return;
  }

  const user = data[0];

  // Sauvegarde session
  localStorage.setItem("utilisateur", JSON.stringify(user));

  showMessage("success", "✅ Connexion réussie !");

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1000);
}

// Message UI
function showMessage(type, text) {
  const el = document.getElementById("message");
  el.className = "message " + type;
  el.textContent = text;
  el.style.display = "block";
}

// Enter = login
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});
</script>

</body>
</html>
